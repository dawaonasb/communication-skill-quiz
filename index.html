<script>
let RAW = { doctors: [], pharmacies: [], summary: [] };

const TEAM_COLORS={'مندوب الحارثية MR1':'#378ADD','مندوب بيروت MR1':'#1D9E75','مندوب الحارثية MR2':'#EF9F27','مندوب بيروت MR2':'#D85A30'};
const C={green:'#1D9E75',coral:'#D85A30',amber:'#EF9F27',blue:'#378ADD'};
const CL=Object.values(TEAM_COLORS);
let charts={};

async function loadData(){
  const sheetId="153OEKNQxlmmnq7wZKnLQsL3KVY7Qoa7ZuGDvZN0T64Q";

  const doctors=await fetch(`https://opensheet.elk.sh/${sheetId}/%F0%9F%A9%BA%20Doctor%20Visits`).then(r=>r.json());
  const pharmacies=await fetch(`https://opensheet.elk.sh/${sheetId}/%F0%9F%8F%A5%20Pharmacy%20Visits`).then(r=>r.json());
  const summary=await fetch(`https://opensheet.elk.sh/${sheetId}/%F0%9F%93%8A%20Daily%20Summary`).then(r=>r.json());

  RAW={doctors,pharmacies,summary};

  initDropdowns();
  render();
}

function allTeams(){return['all',...new Set([...RAW.doctors,...RAW.summary].map(r=>r.team))];}
function allAreas(){return['all',...new Set([...RAW.doctors,...RAW.summary].map(r=>r.area))];}
function count(arr,key){return arr.reduce((a,r)=>{a[r[key]]=(a[r[key]]||0)+1;return a;},{});}
function destroy(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function leg(id,labels,colors){document.getElementById(id).innerHTML=labels.map((l,i)=>`<span><span class="dot" style="background:${colors[i%colors.length]}"></span>${l}</span>`).join('');}
function diffDays(s,w){return Math.round((new Date(s)-new Date(w))/(864e5));}
function tc(t){return TEAM_COLORS[t]||'#888';}
function uniqueDays(arr){return new Set(arr.map(r=>r.workDate)).size;}
function fmt(n){return Number.isInteger(n)?n:n.toFixed(1);}

function initDropdowns(){
  document.getElementById('f-team').innerHTML=allTeams().map(t=>t==='all'?'<option value="all">كل التيمات</option>':`<option value="${t}">${t}</option>`).join('');
  document.getElementById('f-area').innerHTML=allAreas().map(a=>a==='all'?'<option value="all">كل المناطق</option>':`<option value="${a}">${a}</option>`).join('');
}

function filtered(){
  const ft=document.getElementById('f-team').value,fa=document.getElementById('f-area').value;
  const fd1=document.getElementById('f-date-from').value,fd2=document.getElementById('f-date-to').value;
  const f=arr=>arr.filter(r=>{
    if(ft!=='all'&&r.team!==ft) return false;
    if(fa!=='all'&&r.area!==fa) return false;
    if(fd1&&r.workDate<fd1) return false;
    if(fd2&&r.workDate>fd2) return false;
    return true;
  });
  return{docs:f(RAW.doctors),phs:f(RAW.pharmacies),sum:f(RAW.summary)};
}

function render(){
  const{docs,phs,sum}=filtered();
  const totalVisits=docs.length+phs.length;
  const totalOrders=sum.reduce((a,r)=>a+r.orders,0);
  const totalValue=sum.reduce((a,r)=>a+r.value,0);
  const precallYes=docs.filter(r=>r.precall==='نعم').length;
  const precallPct=docs.length>0?Math.round((precallYes/docs.length)*100):0;
  const avgDelay=sum.length>0?Math.round(sum.map(r=>diffDays(r.submitDate,r.workDate)).reduce((a,b)=>a+b,0)/sum.length):0;
  const docDays=uniqueDays(docs)||1,phDays=uniqueDays(phs)||1,sumDays=uniqueDays(sum)||1;
  const allDays=uniqueDays([...docs,...phs,...sum])||1;

  document.getElementById('k-doc').textContent=docs.length;
  document.getElementById('k-ph').textContent=phs.length;
  document.getElementById('k-ord').textContent=totalOrders;
  document.getElementById('k-val').textContent=totalValue.toLocaleString();
  document.getElementById('k-close').textContent=totalVisits>0?Math.round((totalOrders/totalVisits)*100)+'%':'0%';
  document.getElementById('k-delay').textContent=avgDelay===0?'نفس اليوم':avgDelay+' يوم';
  document.getElementById('k-precall').textContent=precallPct+'%';
  document.getElementById('days-label').textContent='— خلال '+allDays+' يوم عمل';

  // (rest of your render code stays exactly the same)
}

document.addEventListener("DOMContentLoaded", loadData);
</script>
